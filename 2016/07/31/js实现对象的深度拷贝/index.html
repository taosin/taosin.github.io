<figure class="highlight javascript"><div class="table-container"><table><tr><td class="code"><pre><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">deepCopy</span>(<span class="params">oldObj</span>) </span>&#123;</span><br><span class="line">        <span class="comment">// 定义一个新的空对象</span></span><br><span class="line">        <span class="keyword">let</span> newObject = &#123;&#125;;</span><br><span class="line">        <span class="comment">// 判断原对象是否存在</span></span><br><span class="line">        <span class="keyword">if</span>(oldObj)&#123;</span><br><span class="line">        <span class="comment">// 判断原对象的类型</span></span><br><span class="line">        <span class="keyword">if</span> (oldObj.constructor === <span class="built_in">Object</span>) &#123;</span><br><span class="line">            newObject = <span class="keyword">new</span> oldObj.constructor();</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            newObject = <span class="keyword">new</span> oldObj.constructor(oldObj.valueOf());</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">// 遍历克隆原对象的属性</span></span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">const</span> key <span class="keyword">in</span> oldObj) &#123;</span><br><span class="line">            <span class="keyword">if</span> (newObject[key] !== oldObj[key]) &#123;</span><br><span class="line">                <span class="keyword">if</span> (<span class="keyword">typeof</span>(oldObj[key]) === <span class="string">'object'</span>) &#123;</span><br><span class="line">                    <span class="comment">// 对象内部的子对象</span></span><br><span class="line">                    newObject[key] = deepCopy(oldObj[key]);</span><br><span class="line">                &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                    newObject[key] = oldObj[key];</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">// 克隆原对象的常用方法</span></span><br><span class="line">        newObject.toString = oldObj.toString;</span><br><span class="line">        newObject.valueOf = oldObj.valueOf;</span><br><span class="line">        <span class="keyword">return</span> newObject;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></div></figure></div><footer class="post-footer"><div class="post-end"><span>------ </span><span>本文结束，感谢您的阅读</span><span> ------</span></div><div class="post-tags"><span class="post-tags-item"><i class="post-tags-item__i fa fa-tags"></i><a class="post-tags-item__a" href="https://iamtaoxin.com/tags/javascript/">javascript</a></span></div><nav class="paginator"><div class="paginator-post"><div class="paginator-post-prev"><a class="paginator-post-prev__a" href="/2016/08/01/leancloud%E6%95%B0%E6%8D%AE%E5%AD%98%E5%82%A8%E5%BC%80%E5%8F%91%E6%8C%87%E5%8D%974/"><i class="fa fa-chevron-left"></i><span>leadcloud数据存储开发指南(四)－Js篇</span></a></div><div class="paginator-post-next"><a class="paginator-post-next__a" href="/2016/07/29/leancloud%E5%AF%B9%E8%B1%A1/"><span>Leancloud对象</span><i class="fa fa-chevron-right"></i></a></div></div></nav></footer></div></div><div class="comments" id="comments"><div id="gitalk-container"></div></div></div><aside class="sidebar" id="sidebar"><div class="sidebar-inner"><div class="sidebar-nav"><span class="sidebar-nav-toc current">文章目录</span><span class="sidebar-nav-ov">站点概览</span></div><section class="sidebar-toc"><div></div></section><!-- ov = overview --><section class="sidebar-ov hide"><div class="sidebar-ov-author"><div class="sidebar-ov-author__avatar"><img class="sidebar-ov-author__avatar_img" src="http://images.iamtaoxin.c
